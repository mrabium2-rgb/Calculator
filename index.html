<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>calculator</title>
</head>
<link rel="stylesheet" href="Calcstyle.css">
<body>
    <div class="display">
    <input type="text" id="expression" readonly>
    <div id="result">0</div>
</div>
<!--BUTTONS--> 
<div class="buttons">
    <button class="numbtn" data-value="7">7</button>
<button class="numbtn" data-value="8">8</button>
<button class="numbtn" data-value="9">9</button>
<button class="opbtn" data-value="/">/</button>

<button class="numbtn" data-value="4">4</button>
<button class="numbtn" data-value="5">5</button>
<button class="numbtn" data-value="6">6</button>
<button class="opbtn" data-value="*">x</button>

<button class="numbtn" data-value="1">1</button>
<button class="numbtn" data-value="2">2</button>
<button class="numbtn" data-value="3">3</button>
<button class="opbtn" data-value="-">-</button>

<button class="numbtn" data-value="%">%</button>
<button class="numbtn" data-value="0">0</button>
<button class="numbtn" data-value=".">.</button>
<button class="opbtn" data-value="+">+</button>

<button class="utilbtn" data-value="Clr">Clr</button>
<button class="utilbtn" data-value="Del">Del</button>
<button class="opbtn" data-value="=">=</button>

</div>  
<script src="Calcscript.js"></script> 
</body>
</html>
